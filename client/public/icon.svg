<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020C18"/>
      <stop offset="100%" stop-color="#041830"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Left champagne glass (lean toward center) -->
  <g transform="translate(196, 295) rotate(35)" fill="white">
    <polygon points="-30,-100 30,-100 9,0 -9,0"/>
    <rect x="-5" y="0" width="10" height="78" rx="5"/>
    <rect x="-22" y="78" width="44" height="10" rx="5"/>
  </g>

  <!-- Right champagne glass (lean toward center) -->
  <g transform="translate(316, 295) rotate(-35)" fill="white">
    <polygon points="-30,-100 30,-100 9,0 -9,0"/>
    <rect x="-5" y="0" width="10" height="78" rx="5"/>
    <rect x="-22" y="78" width="44" height="10" rx="5"/>
  </g>

  <!-- Clink sparkle at the meeting point -->
  <circle cx="256" cy="208" r="9" fill="#00E5A0"/>

  <!-- Sparkle rays -->
  <line x1="256" y1="208" x2="256" y2="170" stroke="#00B4FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="208" x2="222" y2="187" stroke="#00B4FF" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="208" x2="290" y2="187" stroke="#00B4FF" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="208" x2="235" y2="240" stroke="#00E5A0" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="208" x2="277" y2="240" stroke="#00E5A0" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Tiny bubbles -->
  <circle cx="234" cy="162" r="5" fill="#00B4FF" opacity="0.75"/>
  <circle cx="278" cy="156" r="4" fill="#00E5A0" opacity="0.75"/>
  <circle cx="256" cy="148" r="6" fill="white" opacity="0.45"/>
</svg>
